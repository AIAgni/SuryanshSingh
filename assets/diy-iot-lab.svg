<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="ttl dsc">
  <title id="ttl">DIY IoT Accessories Lab</title>
  <desc id="dsc">An illustration showing Raspberry Pi, Arduino, and ESP32 boards with connected accessories.</desc>

  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#fff3e8"/>
    </linearGradient>
  </defs>

  <rect width="720" height="420" rx="28" fill="url(#bg)"/>

  <rect x="55" y="248" width="170" height="102" rx="14" fill="#b31942"/>
  <text x="140" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">Raspberry Pi</text>

  <rect x="275" y="244" width="170" height="106" rx="14" fill="#1d4ed8"/>
  <text x="360" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">Arduino</text>

  <rect x="495" y="252" width="170" height="98" rx="14" fill="#0f766e"/>
  <text x="580" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff">ESP32</text>

  <circle cx="126" cy="185" r="28" fill="#f59e0b"/>
  <text x="126" y="193" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111111">LED</text>

  <rect x="240" y="154" width="78" height="58" rx="10" fill="#111827"/>
  <text x="279" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Sensor</text>

  <rect x="414" y="148" width="72" height="66" rx="10" fill="#6d28d9"/>
  <text x="450" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Motor</text>

  <path d="M126 213 C132 242, 132 242, 140 248" stroke="#0f172a" stroke-width="4" fill="none"/>
  <path d="M279 213 C290 237, 323 236, 360 244" stroke="#0f172a" stroke-width="4" fill="none"/>
  <path d="M450 214 C472 236, 530 235, 580 252" stroke="#0f172a" stroke-width="4" fill="none"/>

  <text x="360" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" font-weight="800" fill="#0f172a">DIY Electronics Accessories</text>
  <text x="360" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="600" fill="#334155">Raspberry Pi  |  Arduino  |  ESP32</text>
</svg>